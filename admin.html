<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Treasureshirt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0a0a0a;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --cream: #f5f0e8;
      --white: #ffffff;
      --gray: #888888;
      --dark-gray: #1a1a1a;
      --danger: #c0392b;
      --success: #27ae60;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--black); color:var(--white); font-family:'Cormorant Garamond','Georgia',serif; min-height:100vh; }

    /* ── LOGIN ── */
    #loginScreen {
      display:flex; align-items:center; justify-content:center;
      min-height:100vh;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
    }
    .login-box {
      width:100%; max-width:380px; padding:3rem 2.5rem;
      border:1px solid rgba(201,168,76,0.25);
      background:var(--dark-gray);
    }
    .login-logo {
      text-align:center; font-size:1.2rem; letter-spacing:0.35em;
      text-transform:uppercase; color:var(--gold); margin-bottom:0.5rem;
    }
    .login-sub {
      text-align:center; font-size:0.7rem; letter-spacing:0.25em;
      text-transform:uppercase; color:var(--gray); margin-bottom:2.5rem;
    }
    .form-group { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1.5rem; }
    .form-group label { font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gray); }
    .form-group input {
      background:transparent; border:none; border-bottom:1px solid rgba(201,168,76,0.3);
      padding:0.6rem 0; color:var(--white); font-family:inherit; font-size:1rem; outline:none;
      transition:border-color 0.3s;
    }
    .form-group input:focus { border-bottom-color:var(--gold); }
    .btn-login {
      width:100%; padding:0.9rem; background:var(--gold); color:var(--black);
      border:none; font-family:inherit; font-size:0.75rem; letter-spacing:0.3em;
      text-transform:uppercase; cursor:pointer; transition:background 0.3s;
    }
    .btn-login:hover { background:var(--gold-light); }
    .login-error {
      color:#e74c3c; font-size:0.75rem; text-align:center;
      margin-top:1rem; font-style:italic; display:none;
    }

    /* ── DASHBOARD ── */
    #dashboard { display:none; }

    .admin-nav {
      background:var(--dark-gray); border-bottom:1px solid rgba(201,168,76,0.2);
      padding:0 2rem; height:60px; display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:50;
    }
    .admin-nav-logo { font-size:1rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); }
    .admin-nav-right { display:flex; align-items:center; gap:1.5rem; }
    .admin-nav-right a { color:var(--gray); text-decoration:none; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; transition:color 0.3s; }
    .admin-nav-right a:hover { color:var(--gold); }
    .btn-logout {
      background:transparent; border:1px solid rgba(201,168,76,0.3); color:var(--gray);
      padding:0.4rem 1rem; font-family:inherit; font-size:0.65rem; letter-spacing:0.2em;
      text-transform:uppercase; cursor:pointer; transition:all 0.3s;
    }
    .btn-logout:hover { border-color:var(--gold); color:var(--gold); }

    .admin-body { padding:2rem; max-width:1200px; margin:0 auto; }

    /* Stats */
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:1.5rem; margin-bottom:2.5rem; }
    .stat-card {
      background:var(--dark-gray); border:1px solid rgba(201,168,76,0.15);
      padding:1.5rem; border-left:3px solid var(--gold);
    }
    .stat-card .num { font-size:2.2rem; color:var(--gold); font-weight:300; letter-spacing:0.05em; }
    .stat-card .lbl { font-size:0.65rem; color:var(--gray); letter-spacing:0.25em; text-transform:uppercase; margin-top:0.25rem; }

    /* Sections */
    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:1.5rem; padding-bottom:0.75rem;
      border-bottom:1px solid rgba(201,168,76,0.15);
    }
    .section-header h2 { font-size:1rem; letter-spacing:0.2em; text-transform:uppercase; font-weight:400; }
    .section-header h2 span { color:var(--gold); font-style:italic; }

    /* Buttons */
    .btn-primary {
      background:var(--gold); color:var(--black); border:none; padding:0.6rem 1.4rem;
      font-family:inherit; font-size:0.7rem; letter-spacing:0.25em; text-transform:uppercase;
      cursor:pointer; transition:background 0.3s;
    }
    .btn-primary:hover { background:var(--gold-light); }
    .btn-ghost {
      background:transparent; border:1px solid rgba(201,168,76,0.3); color:var(--gray);
      padding:0.5rem 1rem; font-family:inherit; font-size:0.65rem; letter-spacing:0.2em;
      text-transform:uppercase; cursor:pointer; transition:all 0.3s;
    }
    .btn-ghost:hover { border-color:var(--gold); color:var(--gold); }
    .btn-danger {
      background:transparent; border:1px solid rgba(192,57,43,0.4); color:#e74c3c;
      padding:0.4rem 0.8rem; font-family:inherit; font-size:0.65rem; letter-spacing:0.15em;
      text-transform:uppercase; cursor:pointer; transition:all 0.3s;
    }
    .btn-danger:hover { background:rgba(192,57,43,0.1); }

    /* Product table */
    .product-table { width:100%; border-collapse:collapse; margin-bottom:3rem; }
    .product-table th {
      text-align:left; font-size:0.6rem; letter-spacing:0.3em; text-transform:uppercase;
      color:var(--gray); padding:0.75rem 1rem; border-bottom:1px solid rgba(201,168,76,0.15);
      font-weight:400;
    }
    .product-table td { padding:1rem; border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; }
    .product-table tr:hover td { background:rgba(201,168,76,0.03); }
    .product-name-cell { font-size:0.95rem; letter-spacing:0.1em; }
    .product-desc-cell { font-size:0.8rem; color:var(--gray); font-style:italic; }
    .price-cell { color:var(--gold); font-size:1rem; }
    .badge-pill {
      display:inline-block; padding:0.2rem 0.6rem; font-size:0.6rem;
      letter-spacing:0.2em; text-transform:uppercase; font-weight:700;
    }
    .badge-new { background:var(--gold); color:var(--black); }
    .badge-sale { background:#e74c3c; color:#fff; }
    .badge-limited { background:#8e44ad; color:#fff; }
    .badge-bestseller { background:#27ae60; color:#fff; }
    .badge-none { color:var(--gray); font-style:italic; font-size:0.75rem; }
    .stock-cell { display:flex; align-items:center; gap:0.5rem; }
    .stock-input {
      width:70px; background:transparent; border:1px solid rgba(201,168,76,0.2);
      color:var(--white); font-family:inherit; font-size:0.9rem; padding:0.3rem 0.5rem;
      text-align:center; outline:none; transition:border-color 0.3s;
    }
    .stock-input:focus { border-color:var(--gold); }
    .stock-low { color:#e74c3c; }
    .stock-ok { color:#27ae60; }
    .actions-cell { display:flex; gap:0.5rem; }

    /* Modal */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200;
      display:flex; align-items:center; justify-content:center; padding:1rem;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      background:var(--dark-gray); border:1px solid rgba(201,168,76,0.25);
      width:100%; max-width:520px; padding:2.5rem;
      transform:translateY(20px); transition:transform 0.3s;
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal h3 { font-size:1rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:2rem; color:var(--gold); font-weight:400; }
    .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .modal .form-group { margin-bottom:0; }
    .modal .form-group.full { grid-column:1/-1; }
    .modal select {
      background:var(--black); border:1px solid rgba(201,168,76,0.3);
      color:var(--white); font-family:inherit; font-size:0.9rem;
      padding:0.6rem 0.5rem; outline:none; width:100%; cursor:pointer;
    }
    .modal-footer { display:flex; gap:1rem; justify-content:flex-end; margin-top:2rem; padding-top:1.5rem; border-top:1px solid rgba(201,168,76,0.1); }

    /* Toast */
    .toast {
      position:fixed; bottom:2rem; right:2rem; padding:0.9rem 1.8rem;
      font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase;
      opacity:0; transform:translateY(10px); transition:all 0.4s; z-index:999; pointer-events:none;
    }
    .toast.success { background:var(--gold); color:var(--black); }
    .toast.error { background:#e74c3c; color:#fff; }
    .toast.show { opacity:1; transform:translateY(0); }

    /* Password change */
    .settings-box {
      background:var(--dark-gray); border:1px solid rgba(201,168,76,0.15);
      padding:2rem; max-width:420px;
    }
    .settings-box h3 { font-size:0.9rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:1.5rem; font-weight:400; }

    /* Category filter */
    .cat-filter { display:flex; gap:0.75rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .cat-btn {
      background:transparent; border:1px solid rgba(201,168,76,0.2); color:var(--gray);
      padding:0.4rem 1rem; font-family:inherit; font-size:0.65rem; letter-spacing:0.2em;
      text-transform:uppercase; cursor:pointer; transition:all 0.3s;
    }
    .cat-btn.active, .cat-btn:hover { border-color:var(--gold); color:var(--gold); }

    @media(max-width:700px) {
      .admin-body { padding:1rem; }
      .modal-grid { grid-template-columns:1fr; }
      .product-table { font-size:0.85rem; }
      .product-table th:nth-child(3), .product-table td:nth-child(3) { display:none; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <p class="login-logo">Treasureshirt</p>
    <p class="login-sub">Admin Portaal</p>
    <div class="form-group">
      <label for="loginEmail">E-mail</label>
      <input type="email" id="loginEmail" placeholder="admin@treasureshirt.com" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="loginPass">Wachtwoord</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="loginBtn">Inloggen</button>
    <p class="login-error" id="loginError">Verkeerd wachtwoord of e-mail.</p>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">

  <nav class="admin-nav">
    <span class="admin-nav-logo">Treasureshirt <span style="color:var(--gray);font-size:0.7rem;letter-spacing:0.2em">/ Admin</span></span>
    <div class="admin-nav-right">
      <a href="index.html" target="_blank">↗ Website</a>
      <button class="btn-logout" id="logoutBtn">Uitloggen</button>
    </div>
  </nav>

  <div class="admin-body">

    <!-- Stats -->
    <div class="stats-row" id="statsRow"></div>

    <!-- Producten -->
    <div class="section-header">
      <h2>Producten <span>& Stock</span></h2>
      <button class="btn-primary" id="addProductBtn">+ Nieuw Product</button>
    </div>

    <div class="cat-filter" id="catFilter"></div>

    <table class="product-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Categorie</th>
          <th>Prijs</th>
          <th>Badge</th>
          <th>Stock</th>
          <th>Acties</th>
        </tr>
      </thead>
      <tbody id="productTableBody"></tbody>
    </table>

    <!-- Wachtwoord wijzigen -->
    <div class="section-header">
      <h2>Instellingen <span>& Beveiliging</span></h2>
    </div>
    <div class="settings-box">
      <h3>Wachtwoord wijzigen</h3>
      <div class="form-group" style="margin-bottom:1rem">
        <label>Nieuw wachtwoord</label>
        <input type="password" id="newPass" placeholder="Nieuw wachtwoord" />
      </div>
      <div class="form-group" style="margin-bottom:1.5rem">
        <label>Bevestig wachtwoord</label>
        <input type="password" id="confirmPass" placeholder="Herhaal wachtwoord" />
      </div>
      <button class="btn-primary" id="changePassBtn">Wachtwoord Opslaan</button>
    </div>

  </div>
</div>

<!-- ── MODAL: Toevoegen / Bewerken ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Nieuw Product</h3>
    <div class="modal-grid">
      <div class="form-group full">
        <label>Naam</label>
        <input type="text" id="fName" placeholder="Productnaam" />
      </div>
      <div class="form-group full">
        <label>Beschrijving</label>
        <input type="text" id="fDesc" placeholder="Korte omschrijving" />
      </div>
      <div class="form-group">
        <label>Prijs (€)</label>
        <input type="number" id="fPrice" placeholder="0" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="fStock" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Categorie</label>
        <select id="fCategory">
          <option value="T-Shirts">T-Shirts</option>
          <option value="Hoodies">Hoodies</option>
          <option value="Accessoires">Accessoires</option>
          <option value="Overig">Overig</option>
        </select>
      </div>
      <div class="form-group">
        <label>Badge</label>
        <select id="fBadge">
          <option value="">Geen badge</option>
          <option value="New">New</option>
          <option value="Bestseller">Bestseller</option>
          <option value="Limited">Limited</option>
          <option value="Sale">Sale</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" id="modalCancel">Annuleren</button>
      <button class="btn-primary" id="modalSave">Opslaan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── AUTH ──
const ADMIN_EMAIL = 'admin@treasureshirt.com';
const DEFAULT_HASH = '97f9503e5aed00dc2b170f76db62efff05e0e52b5ce5ae9d299e1966080eb286';
const SESSION_KEY  = 'ts_admin_session';
const PASS_KEY     = 'ts_admin_hash';
const PRODUCTS_KEY = 'ts_products';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function getPassHash() {
  return localStorage.getItem(PASS_KEY) || DEFAULT_HASH;
}

function isLoggedIn() {
  return sessionStorage.getItem(SESSION_KEY) === 'ok';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  renderAll();
}

// ── LOGIN ──
document.getElementById('loginBtn').addEventListener('click', async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const hash  = await sha256(pass);
  if (email === ADMIN_EMAIL && hash === getPassHash()) {
    sessionStorage.setItem(SESSION_KEY, 'ok');
    document.getElementById('loginError').style.display = 'none';
    showDashboard();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
});

document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();
});

// ── PRODUCTS ──
function getProducts() {
  const raw = localStorage.getItem(PRODUCTS_KEY);
  return raw ? JSON.parse(raw) : [];
}

function saveProducts(products) {
  localStorage.setItem(PRODUCTS_KEY, JSON.stringify(products));
}

// ── RENDER ──
let activeCategory = 'Alles';

function renderAll() {
  const products = getProducts();
  renderStats(products);
  renderCatFilter(products);
  renderTable(products);
}

function renderStats(products) {
  const totalProducts = products.length;
  const totalStock    = products.reduce((s, p) => s + (p.stock || 0), 0);
  const lowStock      = products.filter(p => (p.stock || 0) <= 5).length;
  const cats          = [...new Set(products.map(p => p.category))].length;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="num">${totalProducts}</div><div class="lbl">Producten</div></div>
    <div class="stat-card"><div class="num">${totalStock}</div><div class="lbl">Totale Stock</div></div>
    <div class="stat-card"><div class="num ${lowStock > 0 ? 'stock-low' : 'stock-ok'}">${lowStock}</div><div class="lbl">Laag in Stock (≤5)</div></div>
    <div class="stat-card"><div class="num">${cats}</div><div class="lbl">Categorieën</div></div>
  `;
}

function renderCatFilter(products) {
  const cats = ['Alles', ...new Set(products.map(p => p.category))];
  document.getElementById('catFilter').innerHTML = cats.map(c =>
    `<button class="cat-btn ${activeCategory === c ? 'active' : ''}" data-cat="${c}">${c}</button>`
  ).join('');
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCategory = btn.dataset.cat;
      renderTable(getProducts());
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === activeCategory));
    });
  });
}

function badgePill(badge) {
  if (!badge) return '<span class="badge-none">—</span>';
  const cls = { New:'badge-new', Sale:'badge-sale', Limited:'badge-limited', Bestseller:'badge-bestseller' }[badge] || '';
  return `<span class="badge-pill ${cls}">${badge}</span>`;
}

function renderTable(products) {
  const filtered = activeCategory === 'Alles' ? products : products.filter(p => p.category === activeCategory);
  document.getElementById('productTableBody').innerHTML = filtered.map(p => `
    <tr data-id="${p.id}">
      <td>
        <div class="product-name-cell">${p.name}</div>
        <div class="product-desc-cell">${p.description}</div>
      </td>
      <td style="color:var(--gray);font-size:0.8rem;letter-spacing:0.1em">${p.category}</td>
      <td class="price-cell">€ ${p.price}</td>
      <td>${badgePill(p.badge)}</td>
      <td>
        <div class="stock-cell">
          <input class="stock-input ${(p.stock||0) <= 5 ? 'stock-low' : ''}" type="number" value="${p.stock||0}" min="0" data-id="${p.id}" />
          <button class="btn-ghost" style="padding:0.3rem 0.6rem;font-size:0.6rem" onclick="saveStock('${p.id}', this)">✓</button>
        </div>
      </td>
      <td class="actions-cell">
        <button class="btn-ghost" style="padding:0.4rem 0.8rem;font-size:0.65rem" onclick="openEditModal('${p.id}')">Bewerk</button>
        <button class="btn-danger" onclick="deleteProduct('${p.id}')">✕</button>
      </td>
    </tr>
  `).join('');
}

function saveStock(id, btn) {
  const input    = document.querySelector(`.stock-input[data-id="${id}"]`);
  const newStock = parseInt(input.value) || 0;
  const products = getProducts();
  const p = products.find(x => x.id === id);
  if (!p) return;
  p.stock = newStock;
  saveProducts(products);
  input.classList.toggle('stock-low', newStock <= 5);
  renderStats(products);
  toast('Stock opgeslagen', 'success');
}

function deleteProduct(id) {
  if (!confirm('Product verwijderen?')) return;
  const products = getProducts().filter(p => p.id !== id);
  saveProducts(products);
  renderAll();
  toast('Product verwijderd', 'success');
}

// ── MODAL ──
let editingId = null;

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nieuw Product';
  document.getElementById('fName').value    = '';
  document.getElementById('fDesc').value    = '';
  document.getElementById('fPrice').value   = '';
  document.getElementById('fStock').value   = '';
  document.getElementById('fCategory').value = 'T-Shirts';
  document.getElementById('fBadge').value   = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  const p = getProducts().find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Product Bewerken';
  document.getElementById('fName').value     = p.name;
  document.getElementById('fDesc').value     = p.description;
  document.getElementById('fPrice').value    = p.price;
  document.getElementById('fStock').value    = p.stock || 0;
  document.getElementById('fCategory').value = p.category;
  document.getElementById('fBadge').value    = p.badge || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

document.getElementById('addProductBtn').addEventListener('click', openAddModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('modalSave').addEventListener('click', () => {
  const name  = document.getElementById('fName').value.trim();
  const desc  = document.getElementById('fDesc').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const stock = parseInt(document.getElementById('fStock').value) || 0;
  const cat   = document.getElementById('fCategory').value;
  const badge = document.getElementById('fBadge').value;

  if (!name || isNaN(price)) { toast('Vul naam en prijs in', 'error'); return; }

  const products = getProducts();
  if (editingId) {
    const p = products.find(x => x.id === editingId);
    if (p) { p.name = name; p.description = desc; p.price = price; p.stock = stock; p.category = cat; p.badge = badge; }
  } else {
    products.push({ id: Date.now().toString(), name, description: desc, price, stock, category: cat, badge, emoji: '👕' });
  }
  saveProducts(products);
  renderAll();
  closeModal();
  toast(editingId ? 'Product bijgewerkt' : 'Product toegevoegd', 'success');
});

// ── WACHTWOORD ──
document.getElementById('changePassBtn').addEventListener('click', async () => {
  const np = document.getElementById('newPass').value;
  const cp = document.getElementById('confirmPass').value;
  if (!np) { toast('Vul een nieuw wachtwoord in', 'error'); return; }
  if (np !== cp) { toast('Wachtwoorden komen niet overeen', 'error'); return; }
  if (np.length < 8) { toast('Wachtwoord moet minimaal 8 tekens zijn', 'error'); return; }
  const h = await sha256(np);
  localStorage.setItem(PASS_KEY, h);
  document.getElementById('newPass').value    = '';
  document.getElementById('confirmPass').value = '';
  toast('Wachtwoord gewijzigd', 'success');
});

// ── TOAST ──
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──
if (isLoggedIn()) {
  // Load default products if localStorage is empty
  (async () => {
    if (!localStorage.getItem(PRODUCTS_KEY)) {
      try {
        const res  = await fetch('data/products.json');
        const data = await res.json();
        localStorage.setItem(PRODUCTS_KEY, JSON.stringify(data));
      } catch {}
    }
    showDashboard();
  })();
} else {
  // Pre-load products in background (for shop pages)
  fetch('data/products.json').then(r => r.json()).then(data => {
    if (!localStorage.getItem(PRODUCTS_KEY)) localStorage.setItem(PRODUCTS_KEY, JSON.stringify(data));
  }).catch(() => {});
}
</script>
