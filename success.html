<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betaling geslaagd — Treasureshirt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .result-page { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; }
    .result-box { max-width:480px; }
    .result-icon { font-size:4rem; margin-bottom:2rem; }
    .result-box h1 { font-size:2.5rem; font-weight:300; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem; }
    .result-box h1 span { color:var(--gold); font-style:italic; }
    .result-box p { color:var(--gray); font-style:italic; line-height:1.9; margin-bottom:2rem; }
  </style>
</head>
<body>
  <div class="result-page">
    <div class="result-box">
      <div class="result-icon">✦</div>
      <h1>Betaling <span>Geslaagd</span></h1>
      <p>Bedankt voor je bestelling! Je ontvangt een bevestiging per e-mail. We zorgen dat je bestelling zo snel mogelijk bij je is.</p>
      <a href="shop.html" class="btn">Verder Winkelen</a>
    </div>
  </div>
  <script>localStorage.removeItem('ts_cart');</script>
</body>
</html>
